<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corsa Messanger Integrator</title>
  <style>
    :root {
      --primary: #0044FF;
      --primary-dark: #002DA8;
      --primary-medium: #2F56C1;
      --primary-light: #3F72FF;
      --light: #7197FF;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #f8fbff 0%, #e8f0ff 100%);
      color: #1a1a2e;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      color: var(--primary-dark);
      font-size: 3.1rem;
      margin-bottom: 0.6em;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo-wrap {
      width: 700px;
      height: 400px;
      margin: 2rem auto;
      border-radius: 24px;
      border: 8px solid white;
      box-shadow: 0 16px 40px rgba(0, 68, 255, 0.18);
      overflow: hidden;
      background: linear-gradient(145deg, var(--light), var(--primary-light));
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;   /* ← самое важное */
      display: block;
    }

    /* остальной стиль без изменений */
    .description {
      font-size: 1.24rem;
      line-height: 1.6;
      color: #444466;
      max-width: 680px;
      margin: 0 auto 3.5rem;
    }

    .messengers {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      max-width: 520px;
      margin: 0 auto 3.5rem;
    }

    .messenger-item {
      background: white;
      border-radius: 16px;
      padding: 20px 12px;
      font-weight: 600;
      color: var(--primary-medium);
      border: 2px solid var(--light);
      transition: all 0.18s ease;
    }

    .messenger-item:hover {
      transform: translateY(-4px);
      border-color: var(--primary);
      box-shadow: 0 12px 32px rgba(0, 68, 255, 0.14);
    }

    .features {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      max-width: 620px;
      margin: 0 auto 3.5rem;
    }

    .feature {
      background: white;
      padding: 1.4rem 2rem;
      border-radius: 16px;
      text-align: left;
      font-size: 1.18rem;
      border-left: 5px solid var(--primary);
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }

    .btn-support {
      display: inline-block;
      padding: 16px 48px;
      font-size: 1.22rem;
      font-weight: 700;
      color: white;
      background: var(--primary);
      border: none;
      border-radius: 50px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.22s ease;
      box-shadow: 0 8px 24px rgba(0, 68, 255, 0.32);
    }

    .btn-support:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 14px 36px rgba(0, 68, 255, 0.4);
    }

    @media (max-width: 640px) {
      h1 { font-size: 2.4rem; }
      .messengers { grid-template-columns: repeat(2, 1fr); }
      .logo-wrap { width: 200px; height: 200px; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Corsa Messanger Integrator</h1>

  <div class="logo-wrap">
    <img src="logo.png" alt="Corsa Messenger Integrator">
  </div>

  <div class="description">
    Интеграция всех нужных мессенджеров в одну удобную систему<br>
    прямо внутри вашей сделки или CRM
  </div>

  <div class="messengers">
    <div class="messenger-item">Telegram</div>
    <div class="messenger-item">WhatsApp</div>
    <div class="messenger-item">LinkedIn</div>
    <div class="messenger-item">ВКонтакте</div>
  </div>

  <div class="features">
    <div class="feature">1. Подключи мессенджер на свой вкус</div>
    <div class="feature">2. Настрой его полностью под себя</div>
    <div class="feature">3. Общайся с клиентом прямо в сделке</div>
  </div>

  <a href="https://corsahelp.netlify.app" class="btn-support">Техническая поддержка</a>
</div>

</body>
</html>
